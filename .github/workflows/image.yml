name: Build And Publish Image

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  image:
    name: Publish Multi-Arch Image
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image name
        id: prep
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=ref,event=branch
            type=sha,format=short

      - name: Select build platforms
        id: platforms
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/master" ]; then
            echo "value=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
          else
            echo "value=linux/amd64" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ steps.platforms.outputs.value }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Update manager image digest
        if: github.ref == 'refs/heads/master'
        env:
          IMAGE: ${{ steps.prep.outputs.image }}@${{ steps.build.outputs.digest }}
        run: |
          sed -i -E "s|image: .*|        image: ${IMAGE}|" config/manager/manager.yaml

      - name: Commit manifest update
        if: github.ref == 'refs/heads/master'
        env:
          IMAGE: ${{ steps.prep.outputs.image }}@${{ steps.build.outputs.digest }}
        run: |
          if git diff --quiet -- config/manager/manager.yaml; then
            echo "No manifest changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/manager/manager.yaml
          git commit -m "chore(image): pin manager image to ${IMAGE}"
          git push
